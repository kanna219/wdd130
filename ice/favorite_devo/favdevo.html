<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
         <table>
          <tr>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th>Year</th>
          </tr>
          <tr>
            <td>Gerrit W. Gong</td>
            <td><a href="https://www.churchofjesuschrist.org/study/general-conference/2025/10/25gong" target="_blank">No One Sit Alone</a></td>
            <td>Conference Center in Utha</td>
            <td>2025</td>
          </tr>
          <tr>
            <td>Rusell M. Nelson</td>
            <td><a href="https://speeches.byu.edu/talks/russell-m-nelson/love-laws-god/" target="_blank">The Love and Laws of God</a></td>
            <td>Brigham Young University</td>
            <td>2019</td>
          </tr><tr>
            <td>Jeffrey R. Holland</td>
            <td><a href="https://speeches.byu.edu/talks/jeffrey-r-holland/cast-not-away-therefore-your-confidence/" target="_blank">Cast Not Away Therefore Your Confidence</a></td>
            <td>Brigham Young University</td>
            <td>1999</td>
          </tr>
         </table>
         <br>
         <br>
         <form>
            <div class="form-group">
              <label for="Speaker">Speaker <input type="text" id="Speaker"></label>
            </div>
            <div class="form-group">
              <label for="Title">Title </label><input type="text" id="Title">
            </div>
            <div class="form-group">
              <label for="Location">Location <input type="text" id="Location"></label>
            </div>
            <div class="form-group">
              <label for="Year">Year <input type="text" id="Year"></label>
            </div>
            <input type="Submit" value="Submit" id="Submit">
         </form>

      </div>
    </main>
  </div>
</body>
</html>
