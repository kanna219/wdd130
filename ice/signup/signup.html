<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer{
            position: relative;
            background-color: white;
            border: navy solid 10px;
            border-radius: 20px;
            margin: 40px auto;
            max-width: 400px;
            overflow: hidden;
        }

        .hero-img{
            background-image: url(images/jesus_feeds_5000.jpeg);
            height: 140px;
            width: 100%;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            color: white;
            padding-bottom: 20px;
        }

        h3 {
            text-align: center;
            margin-top: 20px;
        }

        h1, h2{
            display: flex;
            align-items: center;
            color: white;
            text-shadow: 2px 2px black;

        }

        #myForm {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 15px 20px;
            padding: 20px;
            align-items: center;
        }

        #closeBtn {
            position: absolute;
            left: 10px;
            top: 10px;
            z-index: 10;
            padding: 2px 8px;
            cursor: pointer;
        }

        #main_form {
            padding: 20px;
            gap: 10px;
        }

        input[type="text"], input[type="password"], input[type="email"] {
            border: 1px solid gray; 
            border-radius: 2px;    
            padding: 4px;          
        }

        #submit-button {
            background-color: rgb(233, 232, 232);
            border: 1px solid black;
            font-weight: bold;
            border-radius: 2px;
            padding: 3px 5px;
            cursor: pointer;
        }

        .submit{
            grid-column: 1 / 3;
            display: flex;
            justify-content: center;
        }
        .form-footer {
            grid-column: 1 / 3;
            text-align: center;
            margin-top: 10px;
        }

        .checkbox-unit {
            margin-bottom: 17px;
        }
        
        img {
            width: 75px;
        }

        #images {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
        }
        #images img{
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid white;
        }

    </style>




</head>

<body>
    <div id="formContainer">
        <div class="hero-img">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <div id="main">
            <div id="main-form"></div>
                <h3>Sign Up for Daily Scripture Feed</h3>
                <form id="myForm">
                    <button type="button" id="closeBtn">X</button>
                    <label for="username">User Name:</label>
                    <input type="text" id="username" name="username" required>

                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label>Gender:</label>
                    <div>
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="female" required>
                        <label for="female">Female</label>
                    </div>

                    <section class="form-footer">
                        <div class="checkbox-unit">
                            <input type="checkbox" id="newsletter" name="newsletter">
                            <label for="newsletter">Subscribe to newsletter</label>
                        </div>
                    
                            <input type="checkbox" id="conditions" name="conditions" required>
                            <label for="conditions">I acknowledge the terms and conditions</label>
                    </section>

                    <section class="submit">
                        <button type="submit" id="submit-button">Submit</button>
                    </section>
                </form>
            </div>
            <div id="images">
                <img src="images/old_testament.webp">
                <img src="images/new_testament.webp">
                <img src="images/book_of_mormon.webp">
                <img src="images/doctrine_and_covenants.webp">
                <img src="images/pearl_of_great_price.webp">
            </div>
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
